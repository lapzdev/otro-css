<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        
            html {
    box-sizing: border-box;
    font-size: 16px;
    font-family: sans-serif;
   
  }

  *,
  *::after,
  *::before {
    box-sizing: inherit;
  }
  body{
            margin: 0;
        display: grid;
        grid-template-columns: repeat(6,1fr);
        grid-template-rows: repeat(6,auto);  
       
        min-height: 100vh;
        text-align: center;
        }
        body>*{background-color: gray;
        border: thick solid black;}
        h2{text-align: center;
        font-size: clamp(12px,12px + 1vw,32px);
   }
        .header{
            background-color: blue;
            grid-column: 1/7;
            grid-row: 1/2;
           
        }
      
        .nav{
            background-color: rgb(237, 16, 16);
            grid-column: 1/7;
            grid-row: 2/3;
        }
        .aside{
            background-color: rgb(16, 237, 104);
            grid-column: 1/2;
            grid-row: 3/5;
        }
        .seccion1{
            background-color: rgb(226, 154, 21);
            grid-column: 2/5;
            grid-row: 3/4;
        }
        .seccion2{
            background-color: rgb(226, 110, 21);
            grid-column: 5/7;
            grid-row: 3/4;
        }
        .seccion3{
            background-color: rgb(226, 110, 21);
            grid-column: span 3;
            grid-row: 4/5;
        }
        .seccion4{
            background-color: rgb(226, 110, 21);
            grid-column: span 3;
            grid-row: 4/5;
        }
        .footer{
            background-color: rgb(255, 0, 166);
            grid-column: 1/7;
            grid-row: 5/6;
            /* Como es el último elemento también se podría denotar de esta manera
            con el mismo resultado. */
           grid-column: span 6;
           grid-row: span 1;
        }
        @media (min-width:100px) and (max-width:700px){
            .header{
           
            grid-column: 1/7;
            grid-row: 1/2;
           
        }
      
        .nav{
           
            grid-column: 1/7;
            grid-row: 2/3;
        }
        .aside{
           
            grid-column: 1/7;
            grid-row: 3/4;
        }
        .seccion1{
           
            grid-column: span 3;
            grid-row: 4/5;
        }
        .seccion2{
            background-color: rgb(226, 110, 21);
            grid-column: span 3;
            grid-row: 4/5;
        }
        .seccion3{
            background-color: rgb(226, 110, 21);
            grid-column: span 3;
            grid-row: 5/6;
        }
        .seccion4{
            background-color: rgb(226, 110, 21);
            grid-column: span 3;
            grid-row: 5/6;
        }
        .footer{
            background-color: rgb(255, 0, 166);
            grid-column: 1/7;
            grid-row: 6/7;
            /* Como es el último elemento también se podría denotar de esta manera
            con el mismo resultado. */
           grid-column: span 6;
           grid-row: span 1;
        }
        @media screen and (min-width:1024px) {/*Esta se utiliza para hacer cambios en la pantalla de la pc, no en el móvil
            la palabra screen define para donde va orientada que es la pantalla de la pc.*/
            
        }

        }
    </style>
    <title>Document</title>
</head>
<body>
 <header class="header">
   <h2>
    Header
   </h2>
 </header>   
 <nav class="nav">
    <h2>Navegador</h2>
 </nav>
 <aside class="aside">
    <h2>Lateral izquierdo</h2>

 </aside>
 <section class="seccion1">
    <h2>Cuerpo principal</h2>
 </section>
 <section class="seccion2">
   <h2> Cuerpo secundario</h2>
 </section>
 <section class="seccion3">
    <h2> Cuerpo terciario</h2>
  </section>
  <section class="seccion4">
    <h2> Cuerpo cuaternario</h2>
  </section>
 <footer class="footer">
 <h2>Pie</h2>
 </footer>
</body>
</html>
